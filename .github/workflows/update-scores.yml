name: Update dashboard scores

on:
  schedule:
    # Every 30 minutes during US market hours, weekdays. Covers both EDT
    # (13:30-20:00 UTC) and EST (14:30-21:00 UTC). These runs use QUICK mode
    # (daily data + scores only) to stay under the data-request cap.
    - cron: "*/30 13-21 * * 1-5"
    # Full nightly run at 22:37 UTC (off the top of the hour). Refetches the
    # 15-minute intraday series for the 1D/3D/1W charts.
    - cron: "37 22 * * 1-5"
  workflow_dispatch: {}   # manual trigger from the Actions tab = full run

permissions:
  contents: write

jobs:
  update-scores:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch data and compute scores
        env:
          TWELVE_DATA_API_KEY: ${{ secrets.TWELVE_DATA_API_KEY }}
          # Market-hours 30-min runs = quick (daily only). Nightly + manual = full.
          FETCH_MODE: ${{ github.event.schedule == '*/30 13-21 * * 1-5' && 'quick' || 'full' }}
        run: node fetch-scores.js

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Data files are fully regenerated each run, so they always win over
          # the remote: align to latest main, then overwrite with our fresh data.
          mkdir -p /tmp/fresh
          cp public/data/scores.json /tmp/fresh/scores.json
          cp public/data/history.json /tmp/fresh/history.json
          git fetch origin main
          git reset --hard origin/main
          mkdir -p public/data
          cp /tmp/fresh/scores.json public/data/scores.json
          cp /tmp/fresh/history.json public/data/history.json
          git add public/data/scores.json public/data/history.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update data $(date -u +%Y-%m-%dT%H:%MZ)"
            git push origin HEAD:main
          fi
