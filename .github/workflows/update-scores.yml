name: Update dashboard scores

on:
  schedule:
    # 22:00 UTC on weekdays. US market closes 20:00-21:00 UTC depending on DST,
    # so this runs comfortably after the close and after data settles.
    - cron: "0 22 * * 1-5"
  workflow_dispatch: {}   # lets you trigger a run manually from the Actions tab

permissions:
  contents: write          # required so the job can commit data back

jobs:
  update-scores:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch data and compute scores
        env:
          TWELVE_DATA_API_KEY: ${{ secrets.TWELVE_DATA_API_KEY }}
        run: node fetch-scores.js

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # The data files are fully regenerated each run, so they should always
          # win over whatever is on the remote. We never merge them: align to the
          # latest remote main, then overwrite the data with our fresh version.
          mkdir -p /tmp/fresh
          cp public/data/scores.json /tmp/fresh/scores.json
          cp public/data/history.json /tmp/fresh/history.json
          git fetch origin main
          git reset --hard origin/main
          mkdir -p public/data
          cp /tmp/fresh/scores.json public/data/scores.json
          cp /tmp/fresh/history.json public/data/history.json
          git add public/data/scores.json public/data/history.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update data $(date -u +%Y-%m-%d)"
            git push origin HEAD:main
          fi
