name: Update dashboard scores

on:
  schedule:
    # Every 30 minutes during the US session (13:00-21:00 UTC = 5pm-1am Dubai),
    # when prices actually move. QUICK mode (daily + scores only).
    - cron: "*/30 13-21 * * 1-5"
    # Hourly through the Dubai morning/afternoon (04:00-12:00 UTC = 8am-4pm Dubai),
    # when the US market is closed and prices are static. QUICK mode.
    - cron: "0 4-12 * * 1-5"
    # Full nightly run at 23:00 UTC = 3:00am Dubai (Tue-Sat). Writes the 24h
    # baseline, refetches the 15-min intraday series, and sends the digest email.
    - cron: "0 23 * * 1-5"
  workflow_dispatch: {}   # manual trigger = full run

permissions:
  contents: write

jobs:
  update-scores:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch data and compute scores
        env:
          TWELVE_DATA_API_KEY: ${{ secrets.TWELVE_DATA_API_KEY }}
          # Manual runs force a full run; scheduled runs use "auto" and the
          # engine decides full vs quick by UTC hour (nightly hour 23 = full).
          FETCH_MODE: ${{ github.event_name == 'workflow_dispatch' && 'full' || 'auto' }}
          # Daily digest email (optional — leave unset to disable sending).
          POSTMARK_API_KEY: ${{ secrets.POSTMARK_API_KEY }}
          ALERT_TO: ${{ secrets.ALERT_TO }}
          ALERT_FROM: ${{ secrets.ALERT_FROM }}
        run: node fetch-scores.js

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          mkdir -p /tmp/fresh
          cp public/data/scores.json /tmp/fresh/scores.json
          cp public/data/history.json /tmp/fresh/history.json
          cp public/data/alerts.json /tmp/fresh/alerts.json 2>/dev/null || true
          git fetch origin main
          git reset --hard origin/main
          mkdir -p public/data
          cp /tmp/fresh/scores.json public/data/scores.json
          cp /tmp/fresh/history.json public/data/history.json
          cp /tmp/fresh/alerts.json public/data/alerts.json 2>/dev/null || true
          git add public/data/scores.json public/data/history.json
          git add public/data/alerts.json 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update data $(date -u +%Y-%m-%dT%H:%MZ)"
            git push origin HEAD:main
          fi
