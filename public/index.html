function trendScore(s){
  // Price location (0-1): >50DMA 0.5, >100DMA 0.25, >200DMA 0.25. Unavailable MA -> neutral (half weight).
  function loc(ma,w){return ma==null?w/2:(s.price>ma?w:0);}
  const location=loc(s.ma50,0.5)+loc(s.ma100,0.25)+loc(s.ma200,0.25);
  // MA alignment (0-1): 9>21 0.3, 21>50 0.3, 50>200 0.4. Unavailable pair -> neutral (half weight).
  function al(a,b,w){return (a==null||b==null)?w/2:(a>b?w:0);}
  const alignment=al(s.ma9,s.ma21,0.3)+al(s.ma21,s.ma50,0.3)+al(s.ma50,s.ma200,0.4);
  return {location:location,alignment:alignment,total:location+alignment};
}

function calcScore(s){let sc=trendScore(s).total;const r14=s.rsi14;if(r14>70)sc+=0.75;else if(r14>=60)sc+=0.5;else if(r14>=40)sc+=0.25;const r30=s.rsi21;if(r30>70)sc+=0.75;else if(r30>=60)sc+=0.5;else if(r30>=40)sc+=0.25;sc+=(s.macdMom!=null?s.macdMom:0);return Math.min(sc,5)}

function generateBriefing(stocks,prev){
  const alerts=[];const pm={};
  prev.forEach(p=>{pm[p.ticker]={...p,score:calcScore(p)}});
  stocks.forEach(s=>{const p=pm[s.ticker];
    if(!p){alerts.push({type:"new",icon:"🆕",text:`${s.ticker} added — score ${calcScore(s).toFixed(1)}`,delta:0});return}
    const os=p.score,ns=calcScore(s),d=ns-os;
    if(Math.abs(d)>=0.5)alerts.push({type:d>0?"upgrade":"downgrade",icon:d>0?"⬆️":"⬇️",text:`${s.ticker} score ${d>0?"upgraded":"downgraded"} ${os.toFixed(1)} → ${ns.toFixed(1)} (${d>0?"+":""}${d.toFixed(1)})`,delta:d});
  });
  return alerts.sort((a,b)=>Math.abs(b.delta)-Math.abs(a.delta));
}

function getWatchTags(s){
  const tags=[];const thresh=0.02;
  const r50=s.price/s.ma50-1,r100=s.price/s.ma100-1,r200=s.price/s.ma200-1;
  if(Math.abs(r50)<=thresh&&Math.abs(r50)>0)tags.push({ma:"50D",dir:r50>0?"↓":"↑"});
  if(Math.abs(r100)<=thresh&&Math.abs(r100)>0)tags.push({ma:"100D",dir:r100>0?"↓":"↑"});
  if(Math.abs(r200)<=thresh&&Math.abs(r200)>0)tags.push({ma:"200D",dir:r200>0?"↓":"↑"});
  return tags;
}

function HealthGauge({stocks}){
  const canvasRef=useRef(null);const n=stocks.length;
  const avgScore=stocks.reduce((a,s)=>a+s.score,0)/n;
  const pctAboveAll=stocks.filter(s=>(s.ma50!=null&&s.price>s.ma50)&&(s.ma100!=null&&s.price>s.ma100)&&(s.ma200!=null&&s.price>s.ma200)).length/n;
  const rsiHealthy=stocks.filter(s=>s.rsi14>30&&s.rsi14<70).length/n;
  const macdPos=stocks.filter(s=>s.macd>0).length/n;
  const health=((avgScore/5)*0.4+(pctAboveAll)*0.25+(rsiHealthy)*0.15+(macdPos)*0.2)*100;
  useEffect(()=>{
    const c=canvasRef.current;if(!c)return;const dpr=window.devicePixelRatio||1;
    c.width=280*dpr;c.height=160*dpr;c.style.width="280px";c.style.height="160px";
    const ctx=c.getContext("2d");ctx.scale(dpr,dpr);
    const cx=140,cy=130,r=100,lw=18;
    ctx.beginPath();ctx.arc(cx,cy,r,-Math.PI,0);ctx.strokeStyle="rgba(0,0,0,0.05)";ctx.lineWidth=lw;ctx.lineCap="round";ctx.stroke();
    const angle=-Math.PI+(health/100)*Math.PI;
    const grad=ctx.createLinearGradient(cx-r,cy,cx+r,cy);
    grad.addColorStop(0,"#ef4444");grad.addColorStop(0.35,"#f59e0b");grad.addColorStop(0.65,"#84cc16");grad.addColorStop(1,"#22c55e");
    ctx.beginPath();ctx.arc(cx,cy,r,-Math.PI,angle);ctx.strokeStyle=grad;ctx.lineWidth=lw;ctx.lineCap="round";ctx.stroke();
    const nx=cx+Math.cos(angle)*r,ny=cy+Math.sin(angle)*r;
    ctx.beginPath();ctx.arc(nx,ny,6,0,Math.PI*2);ctx.fillStyle="#0f172a";ctx.shadowColor="rgba(15,23,42,0.5)";ctx.shadowBlur=10;ctx.fill();ctx.shadowBlur=0;
    ctx.fillStyle=health>=60?"#22c55e":health>=40?"#f59e0b":"#ef4444";
    ctx.font="bold 32px Inter,sans-serif";ctx.textAlign="center";ctx.fillText(Math.round(health),cx,cy-10);
    ctx.fillStyle="#64748b";ctx.font="11px Inter,sans-serif";ctx.fillText("/ 100",cx,cy+8);
  },[health]);
  const sub=[{l:"Avg Score",v:`${avgScore.toFixed(1)} / 5`,pct:avgScore/5},{l:"Above All MAs",v:`${Math.round(pctAboveAll*100)}%`,pct:pctAboveAll},{l:"RSI Healthy",v:`${Math.round(rsiHealthy*100)}%`,pct:rsiHealthy},{l:"MACD Positive",v:`${Math.round(macdPos*100)}%`,pct:macdPos}];
  return(
    <div style={{background:"rgba(0,0,0,0.05)",border:"1px solid rgba(0,0,0,0.1)",borderRadius:12,padding:"20px 24px",display:"flex",gap:28,alignItems:"center",flexWrap:"wrap"}}>
      <div style={{textAlign:"center"}}><div style={{fontSize:11,color:"#64748b",fontWeight:600,letterSpacing:"0.04em",marginBottom:8}}>PORTFOLIO TECHNICAL HEALTH</div><canvas ref={canvasRef} style={{width:280,height:160}}/></div>
      <div style={{flex:1,minWidth:200}}>{sub.map(s=>(<div key={s.l} style={{marginBottom:10}}><div style={{display:"flex",justifyContent:"space-between",fontSize:11,marginBottom:3}}><span style={{color:"#475569"}}>{s.l}</span><span style={{color:"#1e293b",fontWeight:600}}>{s.v}</span></div><div style={{height:5,background:"rgba(0,0,0,0.1)",borderRadius:3,overflow:"hidden"}}><div style={{height:"100%",width:`${s.pct*100}%`,background:s.pct>=0.6?"#22c55e":s.pct>=0.4?"#f59e0b":"#ef4444",borderRadius:3}}/></div></div>))}<div style={{fontSize:10,color:"#475569",marginTop:8}}>Weighted: Score 40% · MAs 25% · MACD 20% · RSI 15%</div></div>
    </div>
  );
}

function TopMovers({stocks,prev,onSelect}){
  const pm={};prev.forEach(p=>{pm[p.ticker]={...p,score:calcScore(p)}});
  const movers=stocks.map(s=>{const p=pm[s.ticker];return{...s,score:calcScore(s),delta:p?calcScore(s)-p.score:null}}).filter(s=>s.delta!==null&&s.delta!==0).sort((a,b)=>Math.abs(b.delta)-Math.abs(a.delta));
  const ups=movers.filter(m=>m.delta>0).slice(0,3);const downs=movers.filter(m=>m.delta<0).slice(0,3);
  const Card=({s})=>(<div onClick={()=>onSelect(s)} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 14px",background:"rgba(0,0,0,0.03)",border:"1px solid rgba(0,0,0,0.05)",borderRadius:8,cursor:"pointer",flex:"1 1 0",minWidth:160}} onMouseEnter={e=>e.currentTarget.style.background="rgba(99,102,241,0.08)"} onMouseLeave={e=>e.currentTarget.style.background="rgba(0,0,0,0.03)"}>
    <div style={{flex:1,minWidth:0}}><div style={{fontSize:12,fontWeight:700,color:"#0f172a",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{s.ticker}</div><div style={{fontSize:10,color:"#64748b",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{s.name}</div></div>
    <div style={{textAlign:"right",flexShrink:0}}><div style={{fontSize:14,fontWeight:800,color:scoreColor(s.score)}}>{s.score.toFixed(1)}</div><div style={{fontSize:11,fontWeight:700,color:s.delta>0?"#22c55e":"#ef4444"}}>{s.delta>0?"+":""}{s.delta.toFixed(1)}</div></div>
  </div>);
  if(ups.length===0&&downs.length===0)return null;
  return(<div style={{display:"flex",gap:16,marginBottom:20,flexWrap:"wrap"}}>
    {ups.length>0&&<div style={{flex:1,minWidth:280}}><div style={{fontSize:11,fontWeight:600,color:"#22c55e",marginBottom:8,letterSpacing:"0.04em"}}>⬆️ TOP UPGRADES (24H)</div><div style={{display:"flex",gap:8,flexWrap:"wrap"}}>{ups.map(s=><Card key={s.ticker} s={s}/>)}</div></div>}
    {downs.length>0&&<div style={{flex:1,minWidth:280}}><div style={{fontSize:11,fontWeight:600,color:"#ef4444",marginBottom:8,letterSpacing:"0.04em"}}>⬇️ TOP DOWNGRADES (24H)</div><div style={{display:"flex",gap:8,flexWrap:"wrap"}}>{downs.map(s=><Card key={s.ticker} s={s}/>)}</div></div>}
  </div>);
}

function ScoreDistribution({stocks}){
  const bk=[{label:"0–1.5",min:0,max:1.5,color:"#ef4444"},{label:"2.0",min:1.5,max:2.5,color:"#f97316"},{label:"2.5–3.0",min:2.5,max:3.5,color:"#f59e0b"},{label:"3.5–4.0",min:3.5,max:4.5,color:"#84cc16"},{label:"4.5–5.0",min:4.5,max:5.1,color:"#22c55e"}];
  const ct=bk.map(b=>stocks.filter(s=>s.score>=b.min&&s.score<b.max).length);const mx=Math.max(...ct,1);

}

function PriceLadder({stock}){
  const priceRef=useRef(null);const macdRef=useRef(null);const volRef=useRef(null);const legendRef=useRef(null);const priceGutterRef=useRef(null);const macdGutterRef=useRef(null);const s=stock;const sc=calcScore(s);
  const TFS=[{k:"1Y",n:252,intra:false},{k:"6M",n:126,intra:false},{k:"3M",n:63,intra:false},{k:"1M",n:21,intra:false},{k:"1W",n:130,intra:true},{k:"3D",n:78,intra:true},{k:"1D",n:26,intra:true}];
  const [tf,setTf]=useState("1Y");
  const [chartType,setChartType]=useState("line");
  const [barInterval,setBarInterval]=useState("daily");
  useEffect(()=>{
    if(!priceRef.current)return;
    priceRef.current.innerHTML="";if(macdRef.current)macdRef.current.innerHTML="";
    const cfg=TFS.find(t=>t.k===tf)||TFS[0];
    const data=cfg.intra?((typeof INTRADAY!=="undefined")?INTRADAY[s.ticker]:null):((typeof HISTORY!=="undefined")?HISTORY[s.ticker]:null);
    if(!data||data.length<2||typeof LightweightCharts==="undefined"){
      priceRef.current.innerHTML='<div style="color:#64748b;font-size:12px;padding:24px 0">'+(cfg.intra?"Intraday history":"Price history")+' will appear after the next nightly update.</div>';
      if(legendRef.current)legendRef.current.innerHTML="";
      return;
    }
    const isOHLC=data[0]&&data[0].length>=6;
    const times=data.map(r=>r[0]);
    const closes=data.map(r=>isOHLC?r[4]:r[1]);
    const opens=isOHLC?data.map(r=>r[1]):null;
    const highs=isOHLC?data.map(r=>r[2]):null;
    const lows=isOHLC?data.map(r=>r[3]):null;
    const volumes=!cfg.intra?data.map(r=>isOHLC?(r[5]||0):(r[2]||0)):null;
    const SHOW=cfg.n;const start=Math.max(0,closes.length-SHOW);
    const opts={layout:{background:{type:"solid",color:"transparent"},textColor:"#475569",fontSize:11},grid:{vertLines:{color:"rgba(0,0,0,0.05)"},horzLines:{color:"rgba(0,0,0,0.05)"}},rightPriceScale:{borderColor:"rgba(0,0,0,0.1)",minimumWidth:60},timeScale:{borderColor:"rgba(0,0,0,0.1)",timeVisible:cfg.intra,secondsVisible:false,tickMarkFormatter:(t,type)=>{const MONTHS=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];const d=new Date(typeof t==="number"?t*1000:t+"T00:00:00Z");return MONTHS[d.getUTCMonth()];}},crosshair:{mode:0},handleScroll:false,handleScale:false};
    const pc=LightweightCharts.createChart(priceRef.current,Object.assign({},opts,{width:priceRef.current.clientWidth||500,height:300}));
    let priceSeries;
    const showCandle=!cfg.intra&&chartType==="bar"&&isOHLC;
    if(showCandle){
      priceSeries=pc.addCandlestickSeries({upColor:"#22c55e",downColor:"#ef4444",borderUpColor:"#22c55e",borderDownColor:"#ef4444",wickUpColor:"#22c55e",wickDownColor:"#ef4444",priceLineVisible:false,lastValueVisible:false});
      if(barInterval==="weekly"){
        const wk=toWeeklyOHLC(times,opens||closes,highs||closes,lows||closes,closes,volumes||closes.map(()=>0));
        const nW=cfg.n?Math.ceil(cfg.n/5):null;let ws=nW?Math.max(0,wk.length-nW):0;
        if(cfg.n==null){const ytd=new Date().getFullYear()+"-01-01";ws=wk.findIndex(b=>b.time>=ytd);if(ws<0)ws=0;}
        priceSeries.setData(wk.slice(ws));
      } else {
        priceSeries.setData(closes.slice(start).map((c,i)=>({time:times[start+i],open:(opens||closes)[start+i],high:(highs||closes)[start+i],low:(lows||closes)[start+i],close:c})));
      }
    } else {
      priceSeries=pc.addAreaSeries({lineColor:"#1e293b",topColor:"rgba(30,41,59,0.12)",bottomColor:"rgba(30,41,59,0.02)",lineWidth:2,priceLineVisible:false,lastValueVisible:false});
      priceSeries.setData(closes.slice(start).map((v,i)=>({time:times[start+i],value:v})));
    }
    const priceMap={};for(let i=start;i<closes.length;i++)priceMap[times[i]]=closes[i];
    const map50={},map100={},map200={};
    function smaArr(p,mapObj){const out=[];for(let i=0;i<closes.length;i++){if(i<p-1)continue;let sum=0;for(let k=i-p+1;k<=i;k++)sum+=closes[k];if(i>=start){out.push({time:times[i],value:sum/p});mapObj[times[i]]=sum/p;}}return out;}
    let last50=null,last100=null,last200=null;
    if(!cfg.intra){
      const a50=smaArr(50,map50),a100=smaArr(100,map100),a200=smaArr(200,map200);
      if(a50.length){pc.addLineSeries({color:"#3b82f6",lineWidth:1,priceLineVisible:false,crosshairMarkerVisible:false,lastValueVisible:false}).setData(a50);last50=a50[a50.length-1].value;}
      if(a100.length){pc.addLineSeries({color:"#8b5cf6",lineWidth:1,priceLineVisible:false,crosshairMarkerVisible:false,lastValueVisible:false}).setData(a100);last100=a100[a100.length-1].value;}
      if(a200.length){pc.addLineSeries({color:"#f59e0b",lineWidth:1,priceLineVisible:false,crosshairMarkerVisible:false,lastValueVisible:false}).setData(a200);last200=a200[a200.length-1].value;}
    }
    pc.timeScale().fitContent();
    const macdMap={};let lastMacd=null;let mc=null;let histSeries=null;
    if(macdRef.current){
      mc=LightweightCharts.createChart(macdRef.current,Object.assign({},opts,{width:macdRef.current.clientWidth||500,height:110}));
      const ema=function(arr,p){const k=2/(p+1);const o=[];let prev=null;for(let i=0;i<arr.length;i++){if(i<p-1){o.push(null);continue;}if(prev==null){let sum=0;for(let j=i-p+1;j<=i;j++)sum+=arr[j];prev=sum/p;}else{prev=arr[i]*k+prev*(1-k);}o.push(prev);}return o;};
      const e12=ema(closes,12),e26=ema(closes,26);const line=closes.map((_,i)=>(e12[i]!=null&&e26[i]!=null)?e12[i]-e26[i]:null);
      const lc=line.filter(v=>v!=null);const sig=ema(lc,9);let si=0;const histVals=closes.map((_,i)=>{if(line[i]==null)return null;const sg=sig[si++];return sg==null?null:line[i]-sg;});
      const hd=[];for(let i=start;i<closes.length;i++){if(histVals[i]!=null){hd.push({time:times[i],value:histVals[i],color:histVals[i]>=0?"#22c55e":"#ef4444"});macdMap[times[i]]=histVals[i];}}
      if(hd.length)lastMacd=hd[hd.length-1].value;
      histSeries=mc.addHistogramSeries({priceLineVisible:false,lastValueVisible:false});histSeries.setData(hd);
      mc.timeScale().fitContent();
      try{pc.timeScale().subscribeVisibleLogicalRangeChange(function(r){if(r)mc.timeScale().setVisibleLogicalRange(r);});}catch(e){}
    }
    let vc=null;
    if(!cfg.intra&&volumes&&volRef.current){volRef.current.innerHTML="";vc=LightweightCharts.createChart(volRef.current,Object.assign({},opts,{width:volRef.current.clientWidth||500,height:80}));const vd=[];for(let i=start;i<closes.length;i++){const up=i===0||closes[i]>=closes[i-1];vd.push({time:times[i],value:volumes[i],color:up?"rgba(34,197,94,0.7)":"rgba(239,68,68,0.7)"});}vc.addHistogramSeries({priceLineVisible:false,lastValueVisible:false}).setData(vd);vc.timeScale().fitContent();try{pc.timeScale().subscribeVisibleLogicalRangeChange(function(r){if(r)vc.timeScale().setVisibleLogicalRange(r);});}catch(e){}}
    const lastPrice=closes[closes.length-1];
    function fmtN(v){return v==null?"\u2014":Number(v).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2});}
    function item(color,label,val){return '<span style="margin-right:18px;white-space:nowrap"><span style="color:'+color+'">'+label+'</span> <b style="color:#1e293b;font-weight:600">'+val+'</b></span>';}
    function renderLegend(t){
      if(!legendRef.current)return;
      const pv=(t!=null&&priceMap[t]!=null)?priceMap[t]:lastPrice;
      const mv=(t!=null&&macdMap[t]!=null)?macdMap[t]:lastMacd;
      let html=item("#1e293b","Price",fmtN(pv));
      if(!cfg.intra){

              <span style={{fontSize:28,fontWeight:700,color:"#0f172a"}}>{fmt(selected.price)}</span>
              <span style={{fontSize:15,fontWeight:600,color:pctColor(selected.d1)}}>{selected.d1>0?"+":""}{selected.d1.toFixed(2)}%</span><span style={{fontSize:12,color:"#64748b"}}>1D</span>
              <span style={{fontSize:15,fontWeight:600,color:pctColor(selected.m1)}}>{selected.m1>0?"+":""}{selected.m1.toFixed(2)}%</span><span style={{fontSize:12,color:"#64748b"}}>1M</span>
            </div>
            <PriceLadder stock={selected}/>
          </div>
        </div>
      )}

      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:24,flexWrap:"wrap",gap:12}}>
        <div><h1 style={{margin:0,fontSize:22,fontWeight:700,color:"#0f172a",letterSpacing:"-0.02em"}}>ARP Global Capital Technical Dashboard</h1><p style={{margin:"4px 0 0",fontSize:12,color:"#64748b"}}>{enriched.length} instruments · updated {UPDATED||"—"} · Click any row to inspect</p></div>
        <div style={{fontSize:11,color:"#64748b",background:"rgba(0,0,0,0.04)",padding:"5px 10px",borderRadius:6}}>Score: <span style={{color:"#22c55e"}}>■</span> 4-5 &nbsp;<span style={{color:"#f59e0b"}}>■</span> 2.5-3.5 &nbsp;<span style={{color:"#ef4444"}}>■</span> 0-2</div>
      </div>

      <div style={{display:"flex",gap:8,marginBottom:24,justifyContent:"center"}}>
        {[["table","Table"],["charts","Charts"]].map(function(t){const active=view===t[0];return(<button key={t[0]} onClick={()=>setView(t[0])} style={{background:active?"rgba(99,102,241,0.25)":"rgba(0,0,0,0.05)",border:active?"1px solid rgba(99,102,241,0.5)":"1px solid rgba(0,0,0,0.1)",borderRadius:8,color:active?"#4f46e5":"#475569",fontSize:14,fontWeight:600,padding:"9px 28px",cursor:"pointer"}}>{t[1]}</button>);})}
      </div>

      {view==="table"&&(<React.Fragment>
      <div style={{display:"flex",gap:16,marginBottom:20,flexWrap:"wrap"}}>
        <div style={{flex:"1 1 420px",minWidth:340}}><HealthGauge stocks={enriched}/></div>
        <div style={{flex:"0 1 220px",minWidth:200,background:"rgba(0,0,0,0.05)",border:"1px solid rgba(0,0,0,0.1)",borderRadius:12,padding:"20px 18px",display:"flex",flexDirection:"column",justifyContent:"center"}}>
          <div style={{fontSize:11,color:"#64748b",fontWeight:600,letterSpacing:"0.04em",marginBottom:12}}>SCORE DISTRIBUTION</div>
          <ScoreDistribution stocks={enriched}/>
        </div>
        <div style={{flex:"1 1 340px",minWidth:280,background:"rgba(0,0,0,0.03)",border:"1px solid rgba(0,0,0,0.1)",borderRadius:12,padding:"14px 18px"}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
            <span style={{fontSize:14}}>👁</span>
            <span style={{fontSize:11,fontWeight:600,letterSpacing:"0.04em",color:"#64748b"}}>WATCH CLOSELY</span>
            <span style={{fontSize:11,color:"#64748b",background:"rgba(0,0,0,0.05)",padding:"2px 8px",borderRadius:10}}>{enriched.filter(s=>s.watchTags.length>0).length}</span>
          </div>
          {enriched.filter(s=>s.watchTags.length>0).length===0
            ?<div style={{fontSize:12,color:"#64748b"}}>No names near a key moving average.</div>
            :<div style={{display:"flex",flexDirection:"column",gap:6}}>{enriched.filter(s=>s.watchTags.length>0).map(s=>(<div key={s.ticker} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"7px 10px",background:"rgba(245,158,11,0.06)",border:"1px solid rgba(245,158,11,0.15)",borderRadius:8}}>
              <div><span style={{fontSize:12,fontWeight:700,color:"#0f172a",marginRight:8}}>{s.ticker}</span><span style={{fontSize:11,color:"#475569"}}>{s.name}</span></div>
              <div style={{display:"flex",gap:4,flexShrink:0}}>{s.watchTags.map((t,i)=><span key={i} style={{fontSize:11,fontWeight:700,padding:"2px 7px",borderRadius:5,background:t.dir==="↑"?"rgba(34,197,94,0.15)":"rgba(239,68,68,0.15)",color:t.dir==="↑"?"#22c55e":"#ef4444"}}>{t.ma} {t.dir}</span>)}</div>
            </div>))}</div>}
        </div>
      </div>

      <TopMovers stocks={STOCKS} prev={PREV24H} onSelect={s=>setSelected({...s,score:calcScore(s),aboveMa50:(s.ma50!=null&&s.price>s.ma50),aboveMa100:(s.ma100!=null&&s.price>s.ma100),aboveMa200:(s.ma200!=null&&s.price>s.ma200),watchTags:getWatchTags(s)})}/>
      </React.Fragment>)}

      <div style={{display:"flex",gap:10,marginBottom:16,flexWrap:"wrap",alignItems:"center"}}>
        <input type="text" placeholder="Search ticker or name..." value={search} onChange={e=>setSearch(e.target.value)} style={{background:"rgba(0,0,0,0.05)",border:"1px solid rgba(0,0,0,0.12)",borderRadius:8,padding:"8px 14px",color:"#1e293b",fontSize:13,width:240,outline:"none"}}/>
        {FILTERS.map(f=>(<button key={f.key} onClick={()=>setFilter(filter===f.key?"all":f.key)} style={{background:filter===f.key?"rgba(99,102,241,0.25)":"rgba(0,0,0,0.05)",border:filter===f.key?"1px solid rgba(99,102,241,0.5)":"1px solid rgba(0,0,0,0.1)",borderRadius:6,padding:"6px 12px",color:filter===f.key?"#4f46e5":"#475569",fontSize:12,cursor:"pointer",whiteSpace:"nowrap"}}>{f.label}</button>))}
      </div>

      {view==="charts"?(<div>
        <div style={{display:"flex",gap:4,flexWrap:"wrap",marginBottom:14,alignItems:"center"}}>
          <span style={{fontSize:11,color:"#64748b",fontWeight:600,marginRight:4,letterSpacing:"0.04em"}}>SORT BY</span>
          {COLS.filter(c=>!["ticker","name"].includes(c.key)).map(c=>{const active=sortKey===c.key;return(<button key={c.key} onClick={()=>handleSort(c.key)} style={{background:active?"rgba(99,102,241,0.2)":"rgba(0,0,0,0.05)",border:active?"1px solid rgba(99,102,241,0.5)":"1px solid rgba(0,0,0,0.09)",borderRadius:6,padding:"4px 10px",color:active?"#4f46e5":"#64748b",fontSize:11,fontWeight:600,cursor:"pointer",whiteSpace:"nowrap"}}>{c.label}{active?(sortDir>0?" ▲":" ▼"):""}</button>);})}
        </div>
        <ChartGallery stocks={sorted} sortKey={sortKey} onExpand={setChartModal}/>
      </div>):(<React.Fragment>
      <div style={{overflowX:"auto",borderRadius:10,border:"1px solid rgba(0,0,0,0.1)",position:"relative"}}>
        <table style={{width:"100%",borderCollapse:"separate",borderSpacing:0,fontSize:12.5}}>
          <thead style={{position:"sticky",top:0,zIndex:5}}><tr>{COLS.map(c=>(<th key={c.key} onClick={()=>handleSort(c.key)} style={cellStyle(c,true)}>{c.label} {sortKey===c.key?(sortDir>0?"▲":"▼"):""}</th>))}</tr></thead>
          <tbody>
            {sorted.map((s,i)=>{const even=i%2===0;const rowBg=even?"#f8fafc":"#eef2f7";const wt=s.watchTags;
              return(<tr key={s.ticker} style={{cursor:"pointer"}}
                onMouseEnter={e=>e.currentTarget.querySelectorAll("td").forEach(td=>{td.style.background="rgba(99,102,241,0.08)"})}
                onMouseLeave={e=>e.currentTarget.querySelectorAll("td").forEach(td=>{td.style.background=rowBg})}
                onClick={()=>setSelected(s)}>
                <td style={{...cellStyle(COLS[0],false),fontWeight:600,color:"#4f46e5",background:rowBg}}>{s.ticker}</td>
                <td style={{...cellStyle(COLS[1],false),color:"#475569",overflow:"hidden",textOverflow:"ellipsis",maxWidth:180,background:rowBg}}>{s.name}</td>
                <td style={{padding:"8px 12px",textAlign:"right",color:"#0f172a",fontWeight:600,fontVariantNumeric:"tabular-nums",borderBottom:bb,background:rowBg}}>{fmt(s.price)}</td>
                <td style={{padding:"8px 12px",textAlign:"right",color:pctColor(s.d1),fontWeight:500,fontVariantNumeric:"tabular-nums",borderBottom:bb,background:rowBg}} title={s.d1Stale?"Latest data spans more than one trading session — this move covers multiple days, not 1D":undefined}>{s.d1>0?"+":""}{s.d1.toFixed(2)}%{s.d1Stale&&<span style={{color:"#f59e0b",marginLeft:3}}>*</span>}</td>
                <td style={{padding:"8px 12px",textAlign:"right",color:pctColor(s.m1),fontWeight:500,fontVariantNumeric:"tabular-nums",borderBottom:bb,background:rowBg}}>{s.m1>0?"+":""}{s.m1.toFixed(2)}%</td>
                <td style={{padding:"8px 12px",textAlign:"right",color:pct52wColor(s.pct52w),fontWeight:500,fontVariantNumeric:"tabular-nums",borderBottom:bb,background:rowBg}}>{s.pct52w!=null?s.pct52w.toFixed(2)+"%":"—"}</td>
                <td style={{padding:"8px 12px",textAlign:"center",borderBottom:bb,background:rowBg}}><YN val={s.aboveMa50}/></td>
                <td style={{padding:"8px 12px",textAlign:"center",borderBottom:bb,background:rowBg}}><YN val={s.aboveMa100}/></td>
                <td style={{padding:"8px 12px",textAlign:"center",borderBottom:bb,background:rowBg}}><YN val={s.aboveMa200}/></td>
                <td style={{padding:"8px 12px",textAlign:"center",borderBottom:bb,background:rowBg}}>{s.rel921==null?<span style={{color:"#475569"}}>—</span>:<YN val={s.rel921}/>}</td>
                <td style={{padding:"8px 12px",textAlign:"center",borderBottom:bb,background:rowBg}}>{s.rel2150==null?<span style={{color:"#475569"}}>—</span>:<YN val={s.rel2150}/>}</td>
                <td style={{padding:"8px 12px",textAlign:"center",borderBottom:bb,background:rowBg}}>{s.rel50200==null?<span style={{color:"#475569"}}>—</span>:<YN val={s.rel50200}/>}</td>
                <td style={{padding:"8px 12px",textAlign:"center",borderBottom:bb,background:rowBg,fontSize:11}}>
                  {wt.length>0?wt.map((t,j)=><span key={j} style={{color:t.dir==="↑"?"#22c55e":"#ef4444",marginRight:6,fontWeight:700}}>{t.dir} {t.ma}</span>):<span style={{color:"#cbd5e1"}}>—</span>}
                </td>
                <td style={{padding:"8px 12px",textAlign:"right",color:rsiColor(s.rsi14),fontWeight:500,fontVariantNumeric:"tabular-nums",borderBottom:bb,background:rowBg}}>{s.rsi14.toFixed(2)}</td>
                <td style={{padding:"8px 12px",textAlign:"right",color:rsiColor(s.rsi21),fontWeight:500,fontVariantNumeric:"tabular-nums",borderBottom:bb,background:rowBg}}>{s.rsi21.toFixed(2)}</td>
                <td style={{padding:"8px 12px",textAlign:"right",color:mansfieldColor(s.mansfield),fontWeight:600,fontVariantNumeric:"tabular-nums",borderBottom:bb,background:rowBg}}>{s.mansfield!=null?s.mansfield.toFixed(2):"—"}</td>
                <td style={{padding:"8px 12px",textAlign:"center",borderBottom:bb,background:rowBg}}>
                  <span style={{display:"inline-block",padding:"3px 10px",borderRadius:6,background:scoreBg(s.score),color:scoreColor(s.score),fontWeight:700,fontSize:12}}>{s.score.toFixed(1)}</span>
                </td>
                <td style={{padding:"8px 12px",textAlign:"center",borderBottom:bb,background:rowBg}}>{s.sata!=null?<span style={{display:"inline-block",padding:"3px 9px",borderRadius:6,background:sataBg(s.sata),color:sataColor(s.sata),fontWeight:700,fontSize:12}}>{s.sata}/10</span>:<span style={{color:"#475569"}}>—</span>}</td>
              </tr>)})}
          </tbody>
        </table>
      </div>

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginTop:20}}>
        <div style={{padding:16,background:"rgba(0,0,0,0.03)",borderRadius:10,border:"1px solid rgba(0,0,0,0.05)"}}>
          <div style={{fontSize:11,fontWeight:600,color:"#64748b",marginBottom:10,letterSpacing:"0.04em"}}>22V SCORE METHODOLOGY (0–5)</div>
          <div style={{fontSize:12,color:"#475569",lineHeight:1.8}}>
            <div><strong style={{color:"#1e293b"}}>Trend / Structure (0–2)</strong></div>
            <div style={{paddingLeft:10,marginBottom:6}}>Price Location (0–1): +0.5 above 50DMA · +0.25 above 100DMA · +0.25 above 200DMA<br/>MA Alignment (0–1): +0.3 if 9&gt;21DMA · +0.3 if 21&gt;50DMA · +0.4 if 50&gt;200DMA · unavailable terms score neutral midpoint</div>
            <div><strong style={{color:"#1e293b"}}>RSI Momentum (0–1.5)</strong></div>
            <div style={{paddingLeft:10,marginBottom:6}}>Per RSI 14D and RSI 21D: &gt;60 (strong) +0.75 · 40–60 (neutral) +0.25 · &lt;40 (weak) +0</div>
            <div><strong style={{color:"#1e293b"}}>MACD Momentum (0–1.5)</strong></div>
            <div style={{paddingLeft:10}}>Histogram momentum only — rising &amp; positive +1.5 · falling &amp; positive +1.0 · rising &amp; negative +0.75 · falling &amp; negative +0 · flat or near zero-line → neutral. MACD regime is captured by the Trend pillar to avoid double-counting.</div>
          </div>
        </div>
        <div style={{padding:16,background:"rgba(0,0,0,0.03)",borderRadius:10,border:"1px solid rgba(0,0,0,0.05)"}}>
          <div style={{fontSize:11,fontWeight:600,color:"#64748b",marginBottom:10,letterSpacing:"0.04em"}}>SATA SCORE METHODOLOGY (0–10)</div>
          <div style={{fontSize:12,color:"#475569",lineHeight:1.8}}>
            <div style={{marginBottom:4}}><strong style={{color:"#1e293b"}}>Price / Moving Averages (4 pts)</strong> · Close above 10W MA · Close above 30W MA · Close above 40W MA · 30W MA rising</div>
            <div style={{marginBottom:4}}><strong style={{color:"#1e293b"}}>Mansfield RS (1 pt)</strong> · Stock/ACWI ratio above its own 52-week moving average</div>
            <div style={{marginBottom:4}}><strong style={{color:"#1e293b"}}>Momentum (2 pts)</strong> · 12-week rate of change positive · 12-week RoC rising (vs 3 weeks ago)</div>
            <div style={{marginBottom:4}}><strong style={{color:"#1e293b"}}>Breakout (1 pt)</strong> · Weekly high exceeds the prior 13-week high</div>
            <div style={{marginBottom:4}}><strong style={{color:"#1e293b"}}>Volume (1 pt)</strong> · Average up-week volume exceeds average down-week volume (last 10 weeks)</div>
            <div><strong style={{color:"#1e293b"}}>Overhead Resistance (1 pt)</strong> · Close within 8% of 52-week high</div>
            <div style={{marginTop:8,fontSize:11,color:"#64748b"}}>Zones: 7–10 Strong (Stage 2) · 4–6 Neutral (Stage 1/3) · 0–3 Weak (Stage 4). Computed on weekly bars resampled from daily data. Benchmark: ACWI.</div>
          </div>
        </div>
      </div>
      </React.Fragment>)}
    </div>
    {chartModal&&<ChartModal stock={chartModal} onClose={()=>setChartModal(null)}/>}
  </React.Fragment>
  );
}

fetch("./data/scores.json",{cache:"no-store"})
  .then(r=>{if(!r.ok)throw new Error("HTTP "+r.status);return r.json();})
  .then(j=>{
    STOCKS=j.stocks||[];PREV=j.prev||[];PREV24H=j.prev24h||j.prev||[];
    UPDATED=j.updated?new Date(j.updated).toLocaleString(undefined,{dateStyle:"medium",timeStyle:"short"}):null;
    return fetch("./data/history.json",{cache:"no-store"}).then(r=>r.ok?r.json():{series:{}}).catch(function(){return {series:{}};});
  })
  .then(function(h){HISTORY=(h&&h.series)?h.series:{};INTRADAY=(h&&h.intraday)?h.intraday:{};ReactDOM.render(<App/>,document.getElementById("root"));})
  .catch(e=>{document.getElementById("root").innerHTML='<div style="padding:48px;color:#ef4444;font-family:Inter,sans-serif">Could not load data ('+e.message+'). Make sure data/scores.json sits next to this page.</div>';});
</script>
</body>
</html>
